<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=auto" />
    <title>%WEB_TITLE%</title>

    <!-- ============================================================
         "Aggiungi alla schermata Home" su iPhone.
         Con questi tag l'app si apre a tutto schermo, senza la barra
         degli indirizzi di Safari. `status-bar-style: default` lascia
         che iOS tenga da solo il contenuto sotto il notch e sopra la
         barra home: nessun ritocco ai padding dell'app.
         ============================================================ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nido" />
    <!-- il <link rel="icon"> lo aggiunge Expo da solo, da `web.favicon` in app.json -->
    <link rel="apple-touch-icon" href="/icona-180.png" />
    <link rel="manifest" href="/manifest.json" />

    <style id="expo-reset">
      /* Altezza piena: senza questo `flex: 1` dei componenti non ha
         un'altezza su cui calcolarsi e le liste non scorrono. */
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;              /* scorrono le ScrollView, non la pagina */
        overscroll-behavior: none;     /* niente rimbalzo/pull-to-refresh su iOS */
        margin: 0;
        background: #EAE3D2;           /* cornice su desktop; su telefono non si vede */
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent; /* niente lampo grigio al tocco */
      }

      /* ============================================================
         LA COLONNA DA TELEFONO
         L'app è disegnata per un telefono in verticale: su desktop la
         limitiamo a 460px e la centriamo. Su iPhone il max-width non
         entra mai in gioco (viewport ~390px), quindi il mobile resta
         identico a com'era.
         Si fa qui in CSS e non in App.js di proposito: così nessun file
         compilato anche da Android viene toccato.
         ============================================================ */
      #root {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 460px;
        margin: 0 auto;                /* left+right+max-width+auto = centrato */
        display: flex;
        flex: 1;
        background: #F6F2E8;            /* colors.bg */
        box-shadow: 0 0 40px rgba(32, 48, 31, 0.13);
      }

      /* I Modal non restano dentro l'albero React: react-native-web crea
         un <div> e lo appende a <body>, col contenuto in `position: fixed`.
         Senza queste righe un foglio o il menu ☰ si aprirebbero larghi
         quanto il monitor invece che quanto l'app.
         Il `transform` è il pezzo chiave: rende il div il riferimento per
         i `position: fixed` che contiene.
         `pointer-events` serve perché il div esiste anche a modale chiuso:
         così com'è non intercetta i clic, ma il modale aperto sì. */
      body > div:not(#root) {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 460px;
        margin: 0 auto;
        transform: translateZ(0);
        pointer-events: none;
      }
      body > div:not(#root) > * {
        pointer-events: auto;
      }

      /* Il contorno di messa a fuoco del browser è squadrato e stona con
         i campi arrotondati. Lo togliamo al tocco ma lo teniamo per chi
         naviga da tastiera (`:focus-visible`). */
      input:focus,
      textarea:focus {
        outline: none;
      }
      input:focus-visible,
      textarea:focus-visible {
        outline: 2px solid #2E5B3E;
        outline-offset: 1px;
      }
    </style>
  </head>

  <body>
    <noscript>Per usare questa app serve JavaScript attivo.</noscript>
    <div id="root"></div>
  </body>
</html>
